<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255,255,255,0.06);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.72);
      --muted2: rgba(255,255,255,0.55);
      --border: rgba(255,255,255,0.14);
      --accent: #7bd3ff;
      --accent2: #9cffc8;
      --danger: #ff6b6b;
      --shadow: 0 18px 55px rgba(0,0,0,0.45);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background:
        radial-gradient(1100px 550px at 12% 12%, rgba(123,211,255,0.15), transparent 60%),
        radial-gradient(900px 520px at 88% 18%, rgba(156,255,200,0.12), transparent 55%),
        radial-gradient(900px 520px at 60% 92%, rgba(255,107,107,0.10), transparent 55%),
        var(--bg);
    }
    a { color: inherit; }
    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }
    header {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }
    .title {
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 780;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      max-width: 92ch;
    }
    
    /* Filters */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .filter-btn {
      appearance: none;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .filter-btn:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text);
    }
    .filter-btn.active {
      background: rgba(123,211,255,0.15);
      border-color: rgba(123,211,255,0.6);
      color: #fff;
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: 1fr;
      align-items: start;
    }
    @media (min-width: 980px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    .card {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.04));
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }
    .cardHeader {
      display: grid;
      gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.12);
    }
    .nameRow {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }
    .studentName {
      margin: 0;
      font-size: 18px;
      font-weight: 750;
      letter-spacing: -0.01em;
    }
    .unitBadge {
      font-size: 12px;
      background: rgba(255,255,255,0.1);
      padding: 3px 8px;
      border-radius: 12px;
      color: var(--accent);
      font-weight: 600;
    }
    .summary {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }
    .cardBody {
      display: grid;
      gap: 12px;
      padding: 14px 16px 16px;
    }
    .howto {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      padding: 12px 12px 10px;
    }
    .howto h4 {
      margin: 0 0 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.86);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .howto ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }
    .embedBlock {
      display: grid;
      gap: 10px;
    }
    .embedShell {
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.22);
      overflow: hidden;
      position: relative;
      min-height: 470px;
    }
    .embedShell iframe {
      width: 100%;
      height: 460px;
      border: 0;
      display: block;
      background: rgba(0,0,0,0.25);
    }
    .embedOverlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 160ms ease;
    }
    .embedOverlay.show {
      opacity: 1;
    }
    .spinner {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,0.24);
      border-top-color: rgba(123,211,255,0.85);
      animation: spin 900ms linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      user-select: none;
      white-space: nowrap;
    }
    .btn:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.26);
    }
    .btn.primary {
      border-color: rgba(123,211,255,0.55);
      background: rgba(123,211,255,0.12);
    }
    .btn.primary:hover {
      background: rgba(123,211,255,0.18);
    }
    .btn.good {
      border-color: rgba(156,255,200,0.55);
      background: rgba(156,255,200,0.12);
    }
    .btn.good:hover {
      background: rgba(156,255,200,0.18);
    }
    .btn.danger {
      border-color: rgba(255,107,107,0.55);
      background: rgba(255,107,107,0.12);
    }
    .btn.danger:hover {
      background: rgba(255,107,107,0.18);
    }
    .finePrint {
      font-size: 12px;
      color: var(--muted2);
      line-height: 1.35;
    }
    /* Modal */
    .modalBackdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 999;
    }
    .modalBackdrop.show {
      display: flex;
    }
    .modal {
      width: min(1100px, 98vw);
      height: min(92vh, 880px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(14,18,33,0.95);
      box-shadow: 0 30px 90px rgba(0,0,0,0.70);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .modalHeader {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 12px 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
    }
    .modalTitle {
      display: grid;
      gap: 2px;
    }
    .modalTitle strong {
      font-size: 14px;
      letter-spacing: -0.01em;
    }
    .modalTitle span {
      font-size: 12px;
      color: var(--muted2);
    }
    .modalActions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .modalBody {
      background: rgba(0,0,0,0.25);
    }
    .modalBody iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: rgba(0,0,0,0.15);
    }
  </style>
</head>

      return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }
    
    function escapeHtml(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
    
    function render(list) {
      grid.innerHTML = '';
      for (const p of list) {
        const displayName = `${p.first} ${p.lastInitial}.`;
        const iframeId = `game-${p.unit}-${slugify(displayName)}`;
        const card = document.createElement('section');
        card.className = 'card';
        card.innerHTML = `
          <div class="cardHeader">
            <div class="nameRow">
              <h2 class="studentName">${escapeHtml(displayName)}</h2>
              <span class="unitBadge">Unit ${p.unit}</span>
            </div>
            <p class="summary">${escapeHtml(p.summary)}</p>
          </div>
          <div class="cardBody">
            <div class="howto">
              <h4>How to interact</h4>
              <ul>
                ${(p.howTo || []).map(x => `<li>${escapeHtml(x)}</li>`).join('')}
              </ul>
              <div style="height: 10px"></div>
              <div class="buttons">
                <button class="btn good" type="button" data-action="view-pdf" data-pdf="${escapeHtml(p.pdf)}" data-title="${escapeHtml(displayName)}">
                  📄 View PDF
                </button>
                <a class="btn" href="${escapeHtml(p.pdf)}" target="_blank" rel="noopener">
                  ↗ Open PDF
                </a>
              </div>
            </div>
            <div class="embedBlock">
              <div class="embedShell">
                <div class="embedOverlay show" id="${iframeId}-overlay" aria-hidden="true"><div class="spinner"></div></div>
                <iframe
                  id="${iframeId}"
                  title="${escapeHtml(displayName)} project"
                  src="${escapeHtml(p.embedUrl)}"
                  data-src="${escapeHtml(p.embedUrl)}"
                  loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                  allowfullscreen
                ></iframe>
              </div>
              <div class="buttons">
                <button class="btn primary" type="button" data-action="reload" data-iframe="${iframeId}">
                  ⟳ Reload
                </button>
                <a class="btn" href="${escapeHtml(p.shareUrl)}" target="_blank" rel="noopener">
                  ↗ Open project page
                </a>
              </div>
              <div class="finePrint">
                If the project area is blank, try Reload. If it still does not appear, open the project page.
              </div>
            </div>
          </div>
        `;
        grid.appendChild(card);
        const iframe = card.querySelector(`#${CSS.escape(iframeId)}`);
        const overlay = card.querySelector(`#${CSS.escape(iframeId)}-overlay`);
        if (iframe && overlay) {
          const hideOverlay = () => overlay.classList.remove('show');
          iframe.addEventListener('load', () => hideOverlay());
          setTimeout(hideOverlay, 2200);
        }
      }
    }

    function filterProjects(filterVal) {
      if (filterVal === 'all') {
        render(projects);
      } else {
        const num = parseInt(filterVal, 10);
        render(projects.filter(p => p.unit === num));
      }
    }

    // Event Listeners for Filters
    filterBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        filterBtns.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        filterProjects(e.target.dataset.filter);
      });
    });

    function reloadGame(iframeId) {
      const iframe = document.getElementById(iframeId);
      if (!iframe) return;
      const src = iframe.dataset.src || iframe.getAttribute('src');
      if (!src) return;
      iframe.setAttribute('src', 'about:blank');
      setTimeout(() => iframe.setAttribute('src', src), 60);
    }
    
    function openPdf(pdfPath, title) {
      pdfTitle.textContent = `${title} — PDF`;
      pdfOpenNew.href = pdfPath;
      const hint = pdfPath.includes('#') ? '' : '#view=FitH';
      pdfFrame.src = pdfPath + hint;
      pdfBackdrop.classList.add('show');
      pdfBackdrop.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }
    
    function closePdf() {
      pdfBackdrop.classList.remove('show');
      pdfBackdrop.setAttribute('aria-hidden', 'true');
      pdfFrame.src = 'about:blank';
      document.body.style.overflow = '';
    }

    // Initialize with Unit 6
    filterProjects('6');

    document.addEventListener('click', (e) => {
      const t = e.target.closest('[data-action]');
      if (!t) return;
      if (t.dataset.action === 'reload') {
        reloadGame(t.dataset.iframe);
      }
      if (t.dataset.action === 'view-pdf') {
        openPdf(t.dataset.pdf, t.dataset.title);
      }
    });
    
    pdfClose.addEventListener('click', closePdf);
    pdfBackdrop.addEventListener('click', (e) => {
      if (e.target === pdfBackdrop) closePdf();
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && pdfBackdrop.classList.contains('show')) {
        closePdf();
      }
    });
  </script>
</body>
</html>
